<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS CPM TOOL | King Rank Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0000 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 500px; width: 100%; }
        .glass-card {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(255, 0, 0, 0.1);
        }
        .logo {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff0000, #ff4444, #cc0000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            margin-top: 8px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
        }
        input, select {
            width: 100%;
            padding: 14px 18px;
            background: rgba(20, 20, 30, 0.9);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 20px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #ff0000;
            box-shadow: 0 0 0 3px rgba(255,0,0,0.1);
        }
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white;
            font-size: 16px;
            transition: all 0.2s;
        }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-free {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            margin-top: 12px;
        }
        .btn-free:hover { background: linear-gradient(135deg, #009688, #7cb342); }
        .status {
            padding: 12px 20px;
            border-radius: 20px;
            margin: 15px 0;
            font-size: 13px;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .status.success { background: rgba(0,255,136,0.1); border: 1px solid #00ff88; color: #00ff88; }
        .status.error { background: rgba(255,0,0,0.1); border: 1px solid #ff0000; color: #ff0000; }
        .status.info { background: rgba(255,0,0,0.05); border: 1px solid rgba(255,0,0,0.3); color: rgba(255,255,255,0.8); }
        .status.warning { background: rgba(255,193,7,0.1); border: 1px solid #ffc107; color: #ffc107; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .key-info {
            background: rgba(0,255,136,0.05);
            border: 1px solid rgba(0,255,136,0.2);
            border-radius: 16px;
            padding: 10px;
            margin: 15px 0;
            font-size: 12px;
            text-align: center;
        }
        .cooldown-bar {
            background: linear-gradient(135deg, rgba(255,193,7,0.1), rgba(255,100,0,0.1));
            border-radius: 40px;
            padding: 12px;
            margin: 15px 0;
            text-align: center;
            border: 1px solid rgba(255,193,7,0.5);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { border-color: rgba(255,193,7,0.5); }
            50% { border-color: rgba(255,193,7,1); }
        }
        .cooldown-timer {
            font-size: 28px;
            font-weight: 800;
            color: #ffc107;
            font-family: monospace;
            letter-spacing: 2px;
        }
        .cooldown-label {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            margin-top: 5px;
        }
        .hidden { display: none; }
        .note {
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            text-align: center;
            margin-top: 20px;
        }
        .flex-buttons {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .flex-buttons .btn {
            flex: 1;
            margin-top: 0;
        }
        .cooldown-badge {
            display: inline-block;
            background: rgba(255,193,7,0.2);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 10px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card">
        <div class="logo">✦ NEXUS CPM TOOL</div>
        <div class="subtitle">KING RANK SETUP</div>
        <div id="cooldownPanel" class="cooldown-bar hidden">
            <div class="cooldown-timer" id="cooldownTimer">00:00</div>
            <div class="cooldown-label">⏳ COOLDOWN - Wait before next rank set</div>
            <div class="cooldown-label" style="font-size:10px; margin-top:8px;">
                <i class="fas fa-database"></i> Cooldown is stored on the server
            </div>
        </div>
        
        <div id="stepKeyInput">
            <div class="form-group">
                <label><i class="fas fa-key"></i> Nexus Key</label>
                <input type="text" id="nexusKey" placeholder="NX-XXXX-XXXX-XXXX" autocomplete="off">
            </div>
            <div id="statusKey" class="status hidden"></div>
            <button class="btn" id="verifyKeyBtn">
                <i class="fas fa-check-circle"></i> Verify Key
            </button>
            <button class="btn btn-free" id="freeKeyBtn">
                <i class="fas fa-gift"></i> Get Free Nexus Key
            </button>
            <div class="note">
                <i class="fas fa-shield-alt"></i> Cooldown 5 minutes after success (server-side)
            </div>
        </div>
        
        <div id="stepLogin" class="hidden">
            <div id="keyDisplay" class="key-info"></div>
            <div class="form-group">
                <label><i class="fas fa-server"></i> Pilih Server</label>
                <select id="serverSelect">
                    <option value="cpm1">🔥 CPM 1</option>
                    <option value="cpm2">⚡ CPM 2</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" placeholder="your@email.com" autocomplete="off">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <div id="statusLogin" class="status hidden"></div>
            <button class="btn" id="submitBtn">
                <i class="fas fa-crown"></i> SET KING RANK
            </button>
            <div class="flex-buttons">
                <button class="btn" id="backBtn" style="background:#333;">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
                <button class="btn btn-free" id="freeKeyBtn2" style="background:#00b09b;">
                    <i class="fas fa-gift"></i> Free Key
                </button>
            </div>
        </div>
    </div>
</div>

<script>
// Konfigurasi
const API_BASE_URL = 'https://abcdefghoeu7.vercel.app';
const FREE_KEY_URL = "https://nexusofc-generate-key.vercel.app";

let verifiedKey = null;
let verifiedKeyData = null;
let cooldownInterval = null;

const stepKeyInput = document.getElementById('stepKeyInput');
const stepLogin = document.getElementById('stepLogin');
const statusKey = document.getElementById('statusKey');
const statusLogin = document.getElementById('statusLogin');
const cooldownPanel = document.getElementById('cooldownPanel');
const cooldownTimer = document.getElementById('cooldownTimer');

function showStatus(element, message, type) {
    element.textContent = message;
    element.className = `status ${type}`;
    element.classList.remove('hidden');
}

function hideStatus(element) {
    element.classList.add('hidden');
}

function formatCooldownTime(seconds) {
    const minutes = Math.floor(seconds / 60);
    const remainingSeconds = seconds % 60;
    return `${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
}

async function checkBackendCooldown() {
    try {
        const response = await fetch(`${API_BASE_URL}/api/cooldown-status`);
        const data = await response.json();
        
        if (data.active && data.remainingSeconds > 0) {
            cooldownPanel.classList.remove('hidden');
            cooldownTimer.textContent = formatCooldownTime(data.remainingSeconds);
            return data;
        } else {
            cooldownPanel.classList.add('hidden');
            return { active: false };
        }
    } catch (error) {
        console.error('Failed to check cooldown:', error);
        return { active: false };
    }
}

async function startCooldownInterval() {
    if (cooldownInterval) clearInterval(cooldownInterval);
    
    // Cek awal
    await checkBackendCooldown();
    
    cooldownInterval = setInterval(async () => {
        const cooldown = await checkBackendCooldown();
        if (!cooldown.active) {
            if (cooldownInterval) {
                clearInterval(cooldownInterval);
                cooldownInterval = null;
            }
            // Optional: reload page or show notification
            console.log('Cooldown selesai dari backend');
        }
    }, 1000);
}

function openFreeKey() {
    window.open(FREE_KEY_URL, '_blank');
}

document.getElementById('freeKeyBtn').addEventListener('click', openFreeKey);
document.getElementById('freeKeyBtn2').addEventListener('click', openFreeKey);

document.getElementById('verifyKeyBtn').addEventListener('click', async () => {
    const cooldown = await checkBackendCooldown();
    if (cooldown.active) {
        showStatus(statusKey, `⏳ BACKEND COOLDOWN ACTIVE! Wait ${cooldownTimer.textContent}`, 'warning');
        return;
    }
    
    const keyInput = document.getElementById('nexusKey');
    const key = keyInput.value.trim().toUpperCase();
    
    if (!key) {
        showStatus(statusKey, '❌ Masukkan Nexus Key', 'error');
        return;
    }
    
    const btn = document.getElementById('verifyKeyBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Verifying...';
    hideStatus(statusKey);
    
    try {
        const response = await fetch(`${API_BASE_URL}/api/verify-key`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: key })
        });
        
        const data = await response.json();
        
        // Cek apakah response karena cooldown
        if (data.cooldown) {
            showStatus(statusKey, `⏳ ${data.error}`, 'warning');
            await startCooldownInterval();
            return;
        }
        
        if (data.valid) {
            verifiedKey = key;
            verifiedKeyData = data;
            showStatus(statusKey, `✅ Key Valid! Expires: ${data.remaining}`, 'success');
            
            setTimeout(() => {
                stepKeyInput.classList.add('hidden');
                stepLogin.classList.remove('hidden');
                document.getElementById('keyDisplay').innerHTML = `
                    <i class="fas fa-check-circle" style="color:#00ff88"></i> 
                    Key: ${verifiedKey}<br>
                    <i class="fas fa-hourglass-half"></i> Expires: ${data.remaining}
                `;
            }, 1000);
        } else {
            showStatus(statusKey, `❌ ${data.error || 'Invalid Key'}`, 'error');
        }
    } catch (error) {
        showStatus(statusKey, `❌ Connection error: ${error.message}`, 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-check-circle"></i> Verify Key';
    }
});

document.getElementById('submitBtn').addEventListener('click', async () => {
    const cooldownCheck = await checkBackendCooldown();
    if (cooldownCheck.active) {
        showStatus(statusLogin, `⏳ COOLDOWN ACTIVE! Wait ${cooldownTimer.textContent}`, 'warning');
        return;
    }
    
    const server = document.getElementById('serverSelect').value;
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    
    if (!email || !password) {
        showStatus(statusLogin, '❌ Fill in your email and password', 'error');
        return;
    }
    
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Processing...';
    hideStatus(statusLogin);
    
    try {
        const response = await fetch(`${API_BASE_URL}/api/set-rank`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                server: server,
                email: email,
                password: password,
                nexusKey: verifiedKey
            })
        });
        
        const data = await response.json();
        
        if (data.cooldown) {
            showStatus(statusLogin, `⏳ ${data.error}`, 'warning');
            await startCooldownInterval();
            return;
        }
        
        if (data.success) {
            showStatus(statusLogin, `🎉 ${data.message}`, 'success');
            
            await startCooldownInterval();
       
            document.getElementById('password').value = '';
            
        } else {
            showStatus(statusLogin, `❌ ${data.error}`, 'error');
        }
    } catch (error) {
        showStatus(statusLogin, `❌ Connection error: ${error.message}`, 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-crown"></i> SET KING RANK';
    }
});

document.getElementById('backBtn').addEventListener('click', () => {
    stepLogin.classList.add('hidden');
    stepKeyInput.classList.remove('hidden');
    verifiedKey = null;
    verifiedKeyData = null;
    document.getElementById('nexusKey').value = '';
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
    hideStatus(statusKey);
    hideStatus(statusLogin);
});

// ============ INITIALIZE ============
startCooldownInterval();

// Update cooldown setiap halaman terlihat
setInterval(async () => {
    if (document.visibilityState === 'visible') {
        await checkBackendCooldown();
    }
}, 1000);
</script>
</body>
</html>
